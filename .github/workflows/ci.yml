name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: mypy
        run: uv run mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: test-key
      FACT_CHECK_TOOLS_URL: https://factcheck.example.com
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install all dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=60
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true
